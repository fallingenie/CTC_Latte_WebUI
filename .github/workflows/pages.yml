name: GitHub Pages 배포

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: 공개 프런트엔드 준비
    if: ${{ vars.CTC_PUBLIC_API_ORIGIN != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: 소스 받기
        uses: actions/checkout@v7.0.0
      - name: pnpm 준비
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 10.33.2
      - name: Node.js 준비
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: pnpm
      - name: 의존성 설치
        run: pnpm install --frozen-lockfile
      - name: 단위 회귀 검증
        run: pnpm test
      - name: 정적 프런트엔드 빌드
        run: pnpm build
      - name: 재현 가능한 빌드 확인
        run: node scripts/verify-reproducible-build.mjs
      - name: 공개 API 연결 설정
        env:
          CTC_PUBLIC_API_ORIGIN: ${{ vars.CTC_PUBLIC_API_ORIGIN }}
        run: pnpm prepare:pages
      - name: 공개 자료 정책 확인
        run: pnpm verify:cloud-policy
      - name: 공개 실제자료 무작위 대조
        env:
          CTC_PUBLIC_API_ORIGIN: ${{ vars.CTC_PUBLIC_API_ORIGIN }}
        run: pnpm verify:public-data --samples 3 --seed pages-${{ github.sha }}
      - name: Pages 설정
        uses: actions/configure-pages@v5
      - name: Pages 산출물 올리기
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    name: GitHub Pages 게시
    if: ${{ vars.CTC_PUBLIC_API_ORIGIN != '' }}
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Pages 게시
        id: deployment
        uses: actions/deploy-pages@v4
