name: 검증

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-and-build:
    name: ${{ matrix.os }} 검증
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    steps:
      - name: 소스 받기
        uses: actions/checkout@v7.0.0
      - name: pnpm 준비
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 10.33.2
      - name: Node.js 준비
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 20
          cache: pnpm
      - name: 의존성 설치
        run: pnpm install --frozen-lockfile
      - name: 단위 회귀 검증
        run: pnpm test
      - name: 배포 재현성 검증
        run: pnpm verify:reproducible
